name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: false
      - name: Verify repo docs and examples
        run: ./scripts/verify-repo.sh
      - name: Validate project metadata
        run: python3 ./scripts/validate-project-metadata.py
      - name: Validate example JSON schemas
        run: python3 ./scripts/validate-examples.py
      - name: Validate markdown links
        run: python3 ./scripts/validate-doc-links.py
      - name: Validate markdown fences
        run: python3 ./scripts/validate-markdown-fences.py
      - name: Validate portability
        run: python3 ./scripts/validate-portability.py
      - name: Validate script hygiene
        run: python3 ./scripts/validate-script-hygiene.py
      - name: Validate release docs
        run: python3 ./scripts/validate-release-docs.py
      - name: Verify reproducibility metadata
        run: ./scripts/verify-reproducibility.sh
      - name: Verify patch manifest
        run: ./scripts/verify-patch-manifest.sh
      - name: Check patch refresh helper
        run: ./scripts/check-refresh-patch.sh
      - name: Shell syntax check
        run: bash -n scripts/*.sh
      - name: Build patched Entire CLI
        run: ./scripts/build-cli.sh
      - name: Check build lock
        run: ./scripts/check-build-lock.sh
      - name: Check Replay/Eval command surface
        run: ./scripts/check-command-surface.sh
      - name: Check Replay/Eval report fixtures
        run: ./scripts/check-report-fixtures.sh
      - name: Check all-agent eval fixture
        run: ./scripts/check-all-agent-eval.sh
      - name: Check Replay Lab patch tests
        run: ./scripts/check-patch.sh
