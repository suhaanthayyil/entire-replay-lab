name: Feature request
description: Suggest a Replay Lab capability or workflow improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What pain should Replay Lab solve?
      placeholder: "Example: I want to compare agents before upgrading the default model for a repo."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: How would we validate it?
      description: What command, metric, or demo would prove it works?
