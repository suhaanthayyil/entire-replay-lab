name: Bug report
description: Report a Replay Lab build, patch, replay, or eval issue.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for testing Replay Lab. Please include enough detail to reproduce the issue locally.
  - type: input
    id: version
    attributes:
      label: Replay Lab commit
      description: Run `git rev-parse --short HEAD` in this repo.
      placeholder: 1c445e8
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - build-cli
        - patch-check
        - doctor
        - replay checkpoint
        - eval run
        - docs
        - other
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Commands run, target repo shape, and what happened.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Relevant output
      description: Paste command output, redacting secrets.
      render: text
